<svg xmlns='http://www.w3.org/2000/svg' width='1000' height='600' viewBox='0 0 1000 600'>
  <!-- Dumbbell Side Bend — original illustration, CC0 public domain dedication -->
  <rect width='100%' height='100%' fill='#f1f5f9'/>
  <text x='40' y='55' font-family='Arial' font-size='34' fill='#0f172a'>Dumbbell Side Bend — Right Side</text>

  <!-- Floor -->
  <rect x='100' y='504' width='460' height='14' rx='6' fill='#94a3b8'/>

  <!-- Figure shadow -->
  <ellipse cx='330' cy='508' rx='95' ry='7' fill='#9ca3af' opacity='0.3'/>

  <!-- ── LEGS — standing, feet slightly apart ── -->
  <!-- Left leg: thigh -->
  <line x1='300' y1='370' x2='292' y2='468' stroke='#1e3a5c' stroke-width='32' stroke-linecap='round'/>
  <!-- Left knee -->
  <circle cx='292' cy='468' r='15' fill='#1a3050'/>
  <!-- Left shin (skin) -->
  <line x1='292' y1='468' x2='290' y2='502' stroke='#f2b998' stroke-width='25' stroke-linecap='round'/>
  <!-- Left shoe -->
  <ellipse cx='285' cy='508' rx='30' ry='13' fill='#374151'/>
  <ellipse cx='282' cy='504' rx='15' ry='7' fill='#4b5563'/>

  <!-- Right leg: thigh -->
  <line x1='358' y1='372' x2='370' y2='470' stroke='#1e3a5c' stroke-width='32' stroke-linecap='round'/>
  <!-- Right knee -->
  <circle cx='370' cy='470' r='15' fill='#1a3050'/>
  <!-- Right shin (skin) -->
  <line x1='370' y1='470' x2='372' y2='504' stroke='#f2b998' stroke-width='25' stroke-linecap='round'/>
  <!-- Right shoe -->
  <ellipse cx='377' cy='510' rx='30' ry='13' fill='#374151'/>
  <ellipse cx='380' cy='506' rx='15' ry='7' fill='#4b5563'/>

  <!-- ── HIPS / PELVIS ── -->
  <ellipse cx='330' cy='368' rx='48' ry='20' fill='#1e3a5c'/>

  <!-- ── TORSO — bent to the right (shirt) ── -->
  <!-- Lower torso (below waist, more vertical) -->
  <line x1='328' y1='366' x2='338' y2='268' stroke='#2563eb' stroke-width='52' stroke-linecap='round'/>
  <!-- Upper torso (bent rightward — shifts right) -->
  <line x1='340' y1='272' x2='368' y2='168' stroke='#2563eb' stroke-width='48' stroke-linecap='round'/>
  <!-- Shirt highlight (left side) -->
  <line x1='316' y1='272' x2='344' y2='172' stroke='#3b82f6' stroke-width='18' stroke-linecap='round' opacity='0.35'/>
  <!-- Shirt highlight (right compressed side) -->
  <line x1='360' y1='270' x2='386' y2='176' stroke='#1d4ed8' stroke-width='12' stroke-linecap='round' opacity='0.3'/>

  <!-- ── NECK ── -->
  <line x1='370' y1='170' x2='376' y2='146' stroke='#f2b998' stroke-width='20' stroke-linecap='round'/>

  <!-- ── HEAD — tilted right with the bend ── -->
  <circle cx='380' cy='108' r='40' fill='#f2b998'/>
  <!-- Hair -->
  <path d='M 344 106 Q 342 66 380 68 Q 418 66 420 102' fill='#2a1a0e'/>
  <!-- Eyes (front-facing) -->
  <ellipse cx='366' cy='98' rx='5' ry='6' fill='#1f2937'/>
  <ellipse cx='365' cy='96' rx='2' ry='2.5' fill='#fff' opacity='0.55'/>
  <ellipse cx='390' cy='98' rx='5' ry='6' fill='#1f2937'/>
  <ellipse cx='389' cy='96' rx='2' ry='2.5' fill='#fff' opacity='0.55'/>
  <!-- Nose -->
  <path d='M 378 106 Q 374 114 376 120' stroke='#c89070' stroke-width='2.5' fill='none' stroke-linecap='round'/>
  <!-- Mouth (slight smile) -->
  <path d='M 368 126 Q 378 132 390 126' stroke='#c89070' stroke-width='2' fill='none' stroke-linecap='round'/>
  <!-- Left ear -->
  <ellipse cx='342' cy='118' rx='8' ry='13' fill='#e8a882'/>
  <!-- Right ear -->
  <ellipse cx='420' cy='118' rx='8' ry='13' fill='#e8a882'/>

  <!-- ── LEFT ARM — raised overhead (stretched side) ── -->
  <!-- Upper arm going up-left -->
  <line x1='320' y1='188' x2='280' y2='128' stroke='#2563eb' stroke-width='26' stroke-linecap='round'/>
  <!-- Elbow -->
  <circle cx='280' cy='128' r='12' fill='#1d4ed8'/>
  <!-- Forearm angling up toward head -->
  <line x1='280' y1='128' x2='310' y2='86' stroke='#f2b998' stroke-width='20' stroke-linecap='round'/>
  <!-- Hand (resting near head) -->
  <ellipse cx='318' cy='78' rx='14' ry='12' fill='#f2b998'/>

  <!-- ── RIGHT ARM — hanging down with dumbbell (weighted side) ── -->
  <!-- Upper arm going down-right -->
  <line x1='393' y1='188' x2='412' y2='278' stroke='#2563eb' stroke-width='26' stroke-linecap='round'/>
  <!-- Elbow -->
  <circle cx='412' cy='278' r='12' fill='#1d4ed8'/>
  <!-- Forearm going down toward thigh -->
  <line x1='412' y1='278' x2='424' y2='358' stroke='#f2b998' stroke-width='20' stroke-linecap='round'/>
  <!-- Hand -->
  <ellipse cx='428' cy='370' rx='14' ry='12' fill='#f2b998'/>

  <!-- ── DUMBBELL ── (hanging vertically in right hand) -->
  <!-- Bar (vertical, held in hand) -->
  <rect x='422' y='380' width='12' height='50' rx='5' fill='#6b7280'/>
  <rect x='424' y='382' width='8' height='46' rx='3' fill='#9ca3af' opacity='0.4'/>
  <!-- Top plate -->
  <ellipse cx='428' cy='382' rx='20' ry='10' fill='#374151'/>
  <ellipse cx='428' cy='382' rx='12' ry='6' fill='#4b5563'/>
  <!-- Bottom plate -->
  <ellipse cx='428' cy='430' rx='20' ry='10' fill='#374151'/>
  <ellipse cx='428' cy='430' rx='12' ry='6' fill='#4b5563'/>

  <!-- Side bend motion arrow -->
  <path d='M 230 200 Q 180 280 230 360' fill='none' stroke='#ef4444' stroke-width='5'/>
  <polygon points='230,360 215,344 228,340' fill='#ef4444'/>
  <text x='134' y='286' font-family='Arial' font-size='14' fill='#ef4444' transform='rotate(-10 180 286)'>side bend</text>

  <!-- ══ CUE BOX ══ -->
  <rect x='620' y='175' width='325' height='160' rx='8' fill='#ffffff' stroke='#cbd5e1' stroke-width='1.5'/>
  <text x='645' y='214' font-family='Arial' font-size='22' fill='#0f172a'>• Chest stays forward</text>
  <text x='645' y='250' font-family='Arial' font-size='22' fill='#0f172a'>• Pure side bend — no twist</text>
  <text x='645' y='286' font-family='Arial' font-size='22' fill='#0f172a'>• Return to neutral each rep</text>
  <text x='645' y='322' font-family='Arial' font-size='16' fill='#6b7280'>Head stays in line with spine</text>

  <!-- Attribution -->
  <text x='40' y='587' font-family='Arial' font-size='13' fill='#9ca3af'>Original illustration — CC0 public domain</text>
</svg>
