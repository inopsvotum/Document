<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="40" y="60" font-size="36" font-family="Arial" fill="#0f172a">Dumbbell Side Bend</text>
  <line x1="140" y1="390" x2="520" y2="390" stroke="#64748b" stroke-width="6"/>
  <circle cx="300" cy="170" r="24" fill="none" stroke="#111827" stroke-width="6"/>
  <line x1="300" y1="194" x2="300" y2="300" stroke="#111827" stroke-width="8"/>
  <line x1="300" y1="230" x2="250" y2="290" stroke="#111827" stroke-width="8"/>
  <line x1="300" y1="230" x2="350" y2="290" stroke="#111827" stroke-width="8"/>
  <line x1="300" y1="300" x2="270" y2="380" stroke="#111827" stroke-width="8"/>
  <line x1="300" y1="300" x2="340" y2="380" stroke="#111827" stroke-width="8"/>
  <circle cx="350" cy="295" r="14" fill="#0ea5e9"/>
  <path d="M230 180 Q190 240 230 300" fill="none" stroke="#2563eb" stroke-width="6" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#2563eb"/></marker></defs>
  <text x="560" y="180" font-size="24" font-family="Arial" fill="#0f172a">1. Stand tall with one dumbbell</text>
  <text x="560" y="220" font-size="24" font-family="Arial" fill="#0f172a">2. Bend sideways slowly</text>
  <text x="560" y="260" font-size="24" font-family="Arial" fill="#0f172a">3. Return to neutral; switch sides</text>
  <text x="560" y="300" font-size="24" font-family="Arial" fill="#b91c1c">Avoid: twisting torso</text>
</svg>