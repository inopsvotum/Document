<svg xmlns='http://www.w3.org/2000/svg' width='1000' height='600' viewBox='0 0 1000 600'>
  <!-- Dumbbell Russian Twist — original illustration, CC0 public domain dedication -->
  <rect width='100%' height='100%' fill='#f1f5f9'/>
  <text x='40' y='55' font-family='Arial' font-size='34' fill='#0f172a'>Dumbbell Russian Twist — Mid-Rotation</text>

  <!-- Floor -->
  <rect x='60' y='452' width='520' height='14' rx='6' fill='#94a3b8'/>

  <!-- Figure shadow -->
  <ellipse cx='310' cy='456' rx='210' ry='6' fill='#9ca3af' opacity='0.3'/>

  <!-- ── BUTTOCKS / SITTING BASE ── -->
  <ellipse cx='285' cy='450' rx='62' ry='16' fill='#1e3a5c'/>

  <!-- ── LEGS — bent at knee, feet on floor or raised slightly ── -->
  <!-- Left thigh (going right-forward from hip) -->
  <line x1='252' y1='446' x2='380' y2='436' stroke='#1e3a5c' stroke-width='32' stroke-linecap='round'/>
  <!-- Left knee -->
  <circle cx='380' cy='436' r='15' fill='#1a3050'/>
  <!-- Left shin (going down to floor, knee bent ~90°) -->
  <line x1='380' y1='436' x2='400' y2='450' stroke='#f2b998' stroke-width='25' stroke-linecap='round'/>
  <!-- Left shoe -->
  <ellipse cx='414' cy='452' rx='24' ry='12' fill='#374151'/>
  <ellipse cx='418' cy='449' rx='12' ry='6' fill='#4b5563'/>

  <!-- Right thigh (offset slightly) -->
  <line x1='268' y1='450' x2='396' y2='440' stroke='#1e3a5c' stroke-width='28' stroke-linecap='round'/>
  <!-- Right knee -->
  <circle cx='396' cy='440' r='13' fill='#1a3050'/>
  <!-- Right shin -->
  <line x1='396' y1='440' x2='416' y2='452' stroke='#f2b998' stroke-width='22' stroke-linecap='round'/>
  <!-- Right shoe -->
  <ellipse cx='428' cy='454' rx='21' ry='11' fill='#374151'/>

  <!-- ── TORSO — leaning back ~40°, twisted to the right ── -->
  <!-- Lower torso / core -->
  <line x1='282' y1='442' x2='248' y2='342' stroke='#2563eb' stroke-width='50' stroke-linecap='round'/>
  <!-- Upper torso / chest (twisted — slightly wider for perspective) -->
  <line x1='250' y1='346' x2='228' y2='266' stroke='#2563eb' stroke-width='46' stroke-linecap='round'/>
  <!-- Shirt highlight (left chest panel) -->
  <line x1='250' y1='346' x2='230' y2='276' stroke='#3b82f6' stroke-width='20' stroke-linecap='round' opacity='0.35'/>

  <!-- ── NECK ── -->
  <line x1='228' y1='268' x2='224' y2='242' stroke='#f2b998' stroke-width='20' stroke-linecap='round'/>

  <!-- ── HEAD ── -->
  <circle cx='222' cy='202' r='40' fill='#f2b998'/>
  <!-- Hair -->
  <path d='M 185 200 Q 184 160 222 163 Q 260 160 262 196' fill='#2a1a0e'/>
  <!-- Eye (slightly 3/4 turned face — both eyes partially visible) -->
  <ellipse cx='208' cy='192' rx='5' ry='6' fill='#1f2937'/>
  <ellipse cx='207' cy='190' rx='2' ry='2.5' fill='#fff' opacity='0.55'/>
  <ellipse cx='232' cy='192' rx='4' ry='5' fill='#1f2937'/>
  <!-- Nose (3/4 view) -->
  <path d='M 220 200 Q 214 207 218 212' stroke='#c89070' stroke-width='2.5' fill='none' stroke-linecap='round'/>
  <!-- Ear (left side visible) -->
  <ellipse cx='242' cy='212' rx='8' ry='13' fill='#e8a882'/>

  <!-- ── LEFT SHOULDER / ARM — far arm (left, going across body toward dumbbell) ── -->
  <!-- Left upper arm crossing body, going right -->
  <line x1='210' y1='272' x2='296' y2='298' stroke='#2563eb' stroke-width='26' stroke-linecap='round'/>
  <circle cx='296' cy='298' r='12' fill='#1d4ed8'/>
  <!-- Left forearm going right toward dumbbell -->
  <line x1='296' y1='298' x2='380' y2='314' stroke='#f2b998' stroke-width='20' stroke-linecap='round'/>

  <!-- ── RIGHT SHOULDER / ARM — near arm (going right toward dumbbell) ── -->
  <line x1='244' y1='274' x2='318' y2='296' stroke='#2563eb' stroke-width='26' stroke-linecap='round'/>
  <circle cx='318' cy='296' r='12' fill='#1d4ed8'/>
  <!-- Right forearm -->
  <line x1='318' y1='296' x2='394' y2='312' stroke='#f2b998' stroke-width='20' stroke-linecap='round'/>
  <!-- Hands meeting at dumbbell -->
  <ellipse cx='408' cy='316' rx='18' ry='13' fill='#f2b998'/>

  <!-- ── DUMBBELL ── -->
  <!-- Bar -->
  <rect x='420' y='310' width='60' height='12' rx='5' fill='#6b7280'/>
  <rect x='426' y='308' width='48' height='16' rx='3' fill='#9ca3af' opacity='0.4'/>
  <!-- Left plate -->
  <ellipse cx='419' cy='316' rx='15' ry='22' fill='#374151'/>
  <ellipse cx='419' cy='316' rx='9' ry='14' fill='#4b5563'/>
  <!-- Right plate -->
  <ellipse cx='481' cy='316' rx='15' ry='22' fill='#374151'/>
  <ellipse cx='481' cy='316' rx='9' ry='14' fill='#4b5563'/>

  <!-- ── ROTATION ARROWS ── -->
  <!-- Showing the torso twist direction (to the right) -->
  <path d='M 490 280 Q 530 255 555 290' fill='none' stroke='#ef4444' stroke-width='5'/>
  <polygon points='558,290 546,278 543,293' fill='#ef4444'/>
  <text x='495' y='252' font-family='Arial' font-size='14' fill='#ef4444'>rotate torso</text>
  <!-- Counter arc (showing left-right alternation) -->
  <path d='M 490 350 Q 530 375 555 340' fill='none' stroke='#94a3b8' stroke-width='4' stroke-dasharray='6,4'/>

  <!-- ══ CUE BOX ══ -->
  <rect x='620' y='175' width='325' height='160' rx='8' fill='#ffffff' stroke='#cbd5e1' stroke-width='1.5'/>
  <text x='645' y='214' font-family='Arial' font-size='22' fill='#0f172a'>• Lean back slightly, chest up</text>
  <text x='645' y='250' font-family='Arial' font-size='22' fill='#0f172a'>• Rotate torso, not just arms</text>
  <text x='645' y='286' font-family='Arial' font-size='22' fill='#0f172a'>• Keep reps controlled</text>
  <text x='645' y='322' font-family='Arial' font-size='16' fill='#6b7280'>Ribs down, avoid rounding back</text>

  <!-- Attribution -->
  <text x='40' y='587' font-family='Arial' font-size='13' fill='#9ca3af'>Original illustration — CC0 public domain</text>
</svg>
