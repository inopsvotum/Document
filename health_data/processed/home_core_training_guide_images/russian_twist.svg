<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="40" y="60" font-size="36" font-family="Arial" fill="#0f172a">Dumbbell Russian Twist</text>
  <line x1="120" y1="380" x2="520" y2="380" stroke="#64748b" stroke-width="6"/>
  <circle cx="280" cy="230" r="24" fill="none" stroke="#111827" stroke-width="6"/>
  <line x1="300" y1="248" x2="360" y2="320" stroke="#111827" stroke-width="8"/>
  <line x1="360" y1="320" x2="280" y2="360" stroke="#111827" stroke-width="8"/>
  <line x1="360" y1="320" x2="420" y2="360" stroke="#111827" stroke-width="8"/>
  <circle cx="392" cy="290" r="14" fill="#0ea5e9"/>
  <path d="M420 280 Q470 260 510 300" fill="none" stroke="#2563eb" stroke-width="6" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><polygon points="0 0, 6 3, 0 6" fill="#2563eb"/></marker></defs>
  <text x="560" y="180" font-size="24" font-family="Arial" fill="#0f172a">1. Lean back slightly, chest up</text>
  <text x="560" y="220" font-size="24" font-family="Arial" fill="#0f172a">2. Rotate torso left/right with control</text>
  <text x="560" y="260" font-size="24" font-family="Arial" fill="#0f172a">3. Keep movement smooth, not fast</text>
  <text x="560" y="300" font-size="24" font-family="Arial" fill="#b91c1c">Avoid: arm-only swinging</text>
</svg>