<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="40" y="60" font-size="36" font-family="Arial" fill="#0f172a">Dead Bug (one rep each side)</text>
  <line x1="120" y1="350" x2="520" y2="350" stroke="#64748b" stroke-width="6"/>
  <circle cx="240" cy="280" r="26" fill="none" stroke="#111827" stroke-width="6"/>
  <line x1="266" y1="290" x2="360" y2="320" stroke="#111827" stroke-width="8"/>
  <line x1="300" y1="300" x2="340" y2="220" stroke="#111827" stroke-width="8"/>
  <line x1="360" y1="320" x2="430" y2="250" stroke="#111827" stroke-width="8"/>
  <line x1="360" y1="320" x2="430" y2="380" stroke="#111827" stroke-width="8"/>
  <line x1="180" y1="260" x2="130" y2="220" stroke="#2563eb" stroke-width="8"/>
  <line x1="430" y1="380" x2="500" y2="440" stroke="#2563eb" stroke-width="8"/>
  <text x="560" y="180" font-size="24" font-family="Arial" fill="#0f172a">1. Keep low back lightly pressed down</text>
  <text x="560" y="220" font-size="24" font-family="Arial" fill="#0f172a">2. Extend opposite arm + leg slowly</text>
  <text x="560" y="260" font-size="24" font-family="Arial" fill="#0f172a">3. Exhale and return to start</text>
  <text x="560" y="300" font-size="24" font-family="Arial" fill="#b91c1c">Avoid: arching lower back</text>
</svg>